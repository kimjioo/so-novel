name: Docker Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # 关键修改 1：给打包脚本传入 arm64 参数，强制下载 ARM 版的 JRE
      - name: Build app.jar (ARM64)
        run: |
          bash bin/release-linux.sh arm64
          # 关键修改 2：拷贝生成好的 arm64 文件夹里的文件
          cp -r target/sonovel-linux_arm64/{app.jar,config.ini,rules} .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 关键修改 3：只构建并推送 ARM64 专属镜像
      - name: Build and Push Docker image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/sonovel
          echo "Building ARM64 Docker image $IMAGE_NAME:$VERSION ..."
          
          docker buildx build \
            --platform linux/arm64 \
            -t $IMAGE_NAME:$VERSION \
            -t $IMAGE_NAME:latest \
            --push .  

      - name: Output image info
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/sonovel
          echo "Docker image published: ${IMAGE_NAME}:$VERSION"
