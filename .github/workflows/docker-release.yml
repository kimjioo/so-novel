name: Docker Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Debug Maven compiler version
        run: |
          mvn help:effective-pom | grep -A 15 maven-compiler-plugin || echo "No explicit compiler plugin found"
          echo ${GITHUB_REF_NAME}

      - name: Build app.jar
        run: |
          bash bin/release-linux.sh
          cp -r target/sonovel-linux_x64/{app.jar,config.ini,rules} .

      # ================= 新增步骤开始 =================
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # ================= 新增步骤结束 =================

      # 登录 GHCR
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 修改：使用 buildx 构建并推送多架构 Docker 镜像
      - name: Build and Push Docker image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/sonovel
          echo "Building Docker image $IMAGE_NAME:$VERSION for amd64 and arm64..."
          
          # 使用 buildx 替代普通的 docker build
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $IMAGE_NAME:$VERSION \
            -t $IMAGE_NAME:latest \
            --push .  

      # 输出镜像地址
      - name: Output image info
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/sonovel
          echo "Docker image published: ${IMAGE_NAME}:$VERSION"
